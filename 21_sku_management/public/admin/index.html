<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SKU Management Admin</title>
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <aside class="sidebar">
        <div class="brand">
          <strong>SKU 관리</strong>
          <span>Mapping · Bundle · Sales · Inventory</span>
        </div>
        <nav id="moduleNav" class="module-nav" aria-label="관리 메뉴"></nav>
      </aside>
      <section class="workspace">
        <header class="workspace-header">
          <div>
            <h1 id="moduleTitle">관리자</h1>
            <p id="moduleDescription">기능을 선택하세요.</p>
          </div>
          <button id="reloadModuleBtn" class="icon-btn" title="새로고침">↻</button>
        </header>
        <div id="moduleRoot" class="module-root"></div>
      </section>
    </main>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/admin/admin.js" type="module"></script>
  </body>
</html>
