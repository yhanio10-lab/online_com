<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SKU Mapping Admin</title>
    <link rel="stylesheet" href="/admin/sku-mapping.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <h1>SKU 매핑 관리자</h1>
          <p>플랫폼 상품 옵션을 이카운트 품번코드에 연결합니다.</p>
        </div>
        <button id="refreshBtn" class="icon-btn" title="새로고침">↻</button>
      </header>

      <section class="kpis" aria-label="SKU 매핑 KPI">
        <div class="kpi"><span>총 옵션수</span><strong id="kpiTotal">0</strong></div>
        <div class="kpi"><span>매핑완료</span><strong id="kpiMapped">0</strong></div>
        <div class="kpi"><span>미매핑</span><strong id="kpiUnmapped">0</strong></div>
        <div class="kpi danger"><span>충돌</span><strong id="kpiConflicts">0</strong></div>
      </section>

      <section class="filters">
        <select id="platformFilter" aria-label="플랫폼">
          <option value="">전체 플랫폼</option>
          <option value="smartstore">smartstore</option>
          <option value="openmarket">openmarket</option>
        </select>
        <select id="statusFilter" aria-label="상태">
          <option value="">전체 상태</option>
          <option value="mapped">매핑완료</option>
          <option value="unmapped">미매핑</option>
          <option value="conflict">충돌</option>
        </select>
        <input id="searchInput" type="search" placeholder="상품번호, 상품명, 옵션명, 옵션ID, SKU 검색" />
        <button id="searchBtn">검색</button>
        <button id="bulkMapBtn">선택 일괄 매핑</button>
      </section>

      <section class="table-shell">
        <table>
          <thead>
            <tr>
              <th><input id="selectAll" type="checkbox" /></th>
              <th>플랫폼</th>
              <th>플랫폼 상품번호</th>
              <th>상품명</th>
              <th>옵션명</th>
              <th>옵션ID</th>
              <th>현재SKU</th>
              <th>추천SKU</th>
              <th>상태</th>
              <th>액션</th>
            </tr>
          </thead>
          <tbody id="optionRows"></tbody>
        </table>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <dialog id="skuDialog">
      <form method="dialog" class="dialog">
        <header>
          <h2>SKU 검색</h2>
          <button value="close" title="닫기">×</button>
        </header>
        <input id="skuDialogSearch" type="search" placeholder="SKU 코드 또는 이름" />
        <div id="skuResultCount" class="sku-result-count"></div>
        <div id="skuResults" class="sku-results"></div>
      </form>
    </dialog>

    <script src="/admin/sku-mapping.js" type="module"></script>
  </body>
</html>
